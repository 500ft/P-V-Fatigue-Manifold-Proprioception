fields:
  core:
    - name: id
      description: Unique topic identifier (lane prefix + number, e.g. A01)
      detail_level: brief

    - name: title
      description: Concise topic name
      detail_level: brief

    - name: lane
      description: >
        Domain lane: soft_robotics | bio_inspired | wearable_robotics | hri |
        swarm | perception | compliant_mechanisms | embodied_computation
      detail_level: brief

    - name: research_question
      description: The single falsifiable question the study answers
      detail_level: moderate

    - name: gap_proof
      description: >
        Evidence that this specific question is open: nearest paper that
        approaches it, what it leaves unanswered, and why that matters.
        This is nearest-literature evidence of a gap, not proof no paper exists.
      detail_level: detailed

    - name: skill_target
      description: Skills the student builds by executing this topic
      detail_level: brief

    - name: difficulty
      description: >
        1 = straightforward data collection; 2 = some fabrication or
        instrumentation; 3 = non-trivial hardware + analysis; 4 = multi-system
        integration; 5 = novel algorithm + hardware co-design
      detail_level: brief

    - name: minimum_study
      description: >
        Smallest executable study that produces a publishable result:
        sample size, protocol, comparison baseline, key metric.
      detail_level: detailed

  meche_advantage:
    - name: meche_advantage
      description: >
        Why a MechE background gives a genuine edge over CS-only researchers
        on this topic. Should reference fabrication, mechanics modeling,
        or instrumentation skills specifically.
      detail_level: moderate

  cost_and_access:
    - name: hardware_cost_est
      description: >
        Rough bill-of-materials estimate at student lab cost. Excludes
        equipment already available in a typical university makerspace
        (3D printer, laser cutter, basic instruments).
      detail_level: brief

    - name: nearest_paper
      description: >
        One or two closest existing papers. Used to verify gap is real
        and to anchor literature review. Should include arxiv ID or
        journal + year where possible.
      detail_level: moderate

  domain_specific:
    - name: embodied_computation
      description: >
        Whether the robot's passive mechanical structure can perform
        signal processing, memory, or classification without a dedicated
        controller. Spans physical reservoir computing, morphological
        computation, and mechanical logic gates. MechE-advantaged frontier
        sitting at intersection of structural mechanics and information theory.
        Relevant items: H01.
      detail_level: detailed

    - name: material_fatigue_and_reliability
      description: >
        Cyclic degradation, failure-onset prediction, and lifetime extension
        for soft robotic materials under operational loading. Connects silicone
        standardization, self-healing chemistries, and kirigami material cycling.
        Cross-material comparison studies are the key opportunity.
        Relevant items: A01, A05, G02.
      detail_level: detailed

    - name: stigmergy_and_environmental_memory
      description: >
        How swarms encode and decode information via physical or digital
        modifications of the environment, distinct from direct inter-robot
        communication. Includes medium fidelity, signal decay rate, and
        sensing requirements—which are mechanical/chemical engineering
        problems as much as robotics ones.
        Relevant items: E03.
      detail_level: detailed

    - name: wearable_biomechanics
      description: >
        How the mechanical interface between a wearable device and soft
        biological tissue (skin, adipose, muscle) determines assistive
        efficiency, comfort, and inter-subject variability. Anchor placement,
        cuff stiffness, and donning repeatability have emerged as dominant
        performance variables in 2025 exosuit literature.
        Relevant items: C03.
      detail_level: detailed

    - name: multimodal_robot_communication
      description: >
        How robots convey state, intent, and errors through combinations
        of body motion, light, sound, and text, and how task context and
        user attention shift the effectiveness ranking of modalities.
        Key gap: context-dependence not yet systematically studied for
        fixed-station industrial robots.
        Relevant items: D01, D03, D04.
      detail_level: detailed

uncertain: []
