topic: Novel Robotics and Mechatronics Research Questions (Student-Scale)
description: >
  23 research topics across 8 lanes for a MechE senior with ROS2, control, and
  AI/ML skills. Explicitly excludes: autonomous racing, LLM ME-calc verification,
  literature mapping tools, environmental sensor enclosures, payload drones,
  control barrier functions, LLM self-improvement, and infrared imaging.
generated: 2026-06-16

items:
  # ── Lane A: Soft Robotics & Novel Actuation ──────────────────────────────
  - id: A01
    title: Pneumatic Soft Actuator Fatigue Prediction from P-V Signatures
    lane: soft_robotics
    research_question: >
      Can pressure-volume hysteresis loop shape predict silicone pneumatic
      actuator failure onset before mechanical rupture occurs?
    gap_proof: >
      Existing fatigue work on soft actuators reports cycle counts to failure
      but does not characterize in-loop P-V signature changes as a leading
      indicator. Standardized elastomer characterization framework (Roels et al.,
      Advanced Intelligent Systems 2026) calls this out explicitly as missing.
    skill_target: soft robotics fabrication, pneumatic circuits, signal processing
    difficulty: 2
    minimum_study: >
      Cast 10 Dragon Skin actuators, cycle to failure on a pressure jig,
      record P-V loops at intervals, fit a logistic degradation model,
      compare failure-onset prediction to visual inspection baseline.
    meche_advantage: >
      Silicone casting, mold design, and pneumatic circuit are fabrication
      problems—CS researchers cannot build the hardware.
    hardware_cost_est: ~$150 (silicone, molds, pressure sensor, solenoid valve)
    nearest_paper: Roels et al., Advanced Intelligent Systems 2026

  - id: A02
    title: LMPA Variable-Stiffness Joint — Switching Latency Floor and Cycle Degradation
    lane: soft_robotics
    research_question: >
      What is the minimum achievable stiffness-switching latency for a
      Field's-metal-filled silicone joint under active Peltier cooling,
      and how does the latency-stiffness-ratio trade-off evolve over
      200 thermal cycles?
    gap_proof: >
      LMPA switching times are far longer than the original entry assumed:
      resistive heating alone takes ~50 s to melt and ~90 s to resolidify
      (Esser et al., RoboSoft 2024); forced convection reduces this to ~28–30 s
      (Gaira et al. 2025, DOI 10.1002/adrr.202500031); only the melt direction
      can approach sub-second with aggressive heating (Schubert & Floreano 2013,
      DOI 10.1039/c3ra44412k). Cycle degradation to ~80 cycles is partly
      characterized (Al Harthy et al. 2025, DOI 10.1002/aisy.202500756) but
      the Peltier-assisted latency floor and post-80-cycle degradation remain
      unmeasured. The paper frames the switching speed–stiffness ratio–cycle
      life as a three-way trade surface, not a "500 ms reactive grasping" claim.
    skill_target: thermomechanical design, thermal control, fatigue characterization
    difficulty: 3
    minimum_study: >
      Build 5 joint prototypes with embedded Peltier elements, measure switching
      latency and stiffness ratio at 3 Peltier power levels, cycle to 200 total
      switches, record latency drift and stiffness ratio degradation, fit a
      latency–stiffness–life trade surface.
    meche_advantage: >
      Phase-change material handling, thermal modelling, and joint fabrication
      are squarely ME. CS researchers rarely build these.
    hardware_cost_est: ~$250 (Field's metal, silicone, Peltier elements, load cell)
    nearest_paper: >
      Gaira et al. 2025, DOI 10.1002/adrr.202500031;
      Al Harthy et al. 2025, DOI 10.1002/aisy.202500756;
      Schubert & Floreano 2013, DOI 10.1039/c3ra44412k

  - id: A01+A04
    title: "Combined: P-V Fatigue Leading Indicator + Shared-Manifold Proprioception"
    lane: soft_robotics
    research_question: >
      In a multi-chamber soft gripper on a shared pneumatic manifold, can
      (1) pressure-volume hysteresis loop shape serve as a leading indicator
      of actuator fatigue before rupture, and (2) control-loop pressures
      reconstruct gripper pose despite inter-chamber cross-talk—and do
      fatigue-induced P-V drift and proprioceptive drift couple in a way
      that requires joint monitoring?
    gap_proof: >
      A01 gap: Roels et al. 2026 (DOI 10.1002/aisy.202500699) standardizes
      elastomer characterization but explicitly excludes fatigue; Torzini et al.
      2024 (DOI 10.1007/s00170-024-14216-0) and Libby et al. 2022
      (arXiv:2212.03420) report only cycles-to-failure or FEM-deviation—none
      use in-loop P-V hysteresis as a leading indicator. GENUINELY OPEN.
      A04 gap: Pressure-only proprioception is established for isolated chambers
      (Liangliang Wang et al., Soft Robotics 10(4) 2023, DOI 10.1089/soro.2021.0056;
      Jun Wang et al., Adv. Intelligent Systems 7(4) 2025, arXiv:2411.07309).
      The shared-manifold cross-talk condition has not been studied.
      Combined gap: No paper monitors both health (P-V fatigue) and pose
      (proprioception) from the same pressure signal stream on a shared
      manifold, or characterizes whether fatigue-induced P-V shift degrades
      proprioceptive accuracy—a coupled failure mode that is uniquely
      observable only when both are measured simultaneously.
    skill_target: >
      soft robotics fabrication, pneumatic circuits, signal processing,
      system identification, machine learning, fatigue characterization
    difficulty: 3
    minimum_study: >
      Build a 3-chamber silicone gripper on a shared manifold with one
      pressure sensor per chamber. Run two interleaved experiment phases:
      (Phase 1) 2000 pose-labeled pressure traces at 0/500/1000/1500 cycle
      marks—measure proprioceptive accuracy vs. fatigue stage.
      (Phase 2) Cycle gripper to failure, record P-V loops at 10% life
      intervals, fit a degradation model predicting remaining life from
      loop shape. Compare failure-onset prediction (P-V method) against
      proprioceptive-accuracy degradation as a correlated leading indicator.
    meche_advantage: >
      Silicone casting, manifold design, pneumatic cycling jig, and load-cell
      ground-truth instrumentation are fabrication and measurement problems
      that CS researchers cannot execute without ME collaboration.
    hardware_cost_est: ~$320 (silicone, manifold, 3x pressure sensors, solenoid valves, load cell)
    nearest_paper: >
      A01: Roels et al. 2026, DOI 10.1002/aisy.202500699; Libby et al. 2022, arXiv:2212.03420.
      A04: Liangliang Wang et al. 2023, DOI 10.1089/soro.2021.0056; Jun Wang et al. 2025, arXiv:2411.07309.

  - id: A03
    title: Analytical vs. Empirical Tendon Models in Braided Soft Hands
    lane: soft_robotics
    research_question: >
      Do existing analytical tendon-routing models (constant-curvature
      or moment-arm based) accurately predict grip-force distribution
      in a braided-tendon soft hand, or do they require empirical correction?
    gap_proof: >
      Analytical models are derived for rigid-link robots; their accuracy
      on soft, compliant fingers with braid-induced stiffness coupling is
      assumed but not systematically validated at finger-force resolution.
    skill_target: structural mechanics, tendon kinematics, experimental validation
    difficulty: 2
    minimum_study: >
      3D-print or cast 3-finger hand, instrument with 3-axis fingertip load
      cells, compare predicted vs. measured force at 15 grasp configurations,
      quantify error and fit a correction factor.
    meche_advantage: Hand design, braid mechanics, and force measurement are ME.
    hardware_cost_est: ~$300 (printer filament, load cells, servo motors)
    nearest_paper: Tendon-driven compliant hand surveys, 2021-2024

  - id: A04
    title: Shared-Manifold Cross-Talk in Pressure-Only Soft Gripper Proprioception
    lane: soft_robotics
    research_question: >
      In a multi-chamber soft gripper on a shared pneumatic manifold, does
      inter-chamber pressure cross-talk prevent accurate pose reconstruction
      from control-loop pressures alone, and can a cross-talk correction model
      recover the accuracy demonstrated in single-chamber or isolated designs?
    gap_proof: >
      Pressure-only proprioception for soft robots is established: Liangliang
      Wang et al. (Soft Robotics 10(4) 2023, DOI 10.1089/soro.2021.0056) used
      unified soft-body encoding + RNN; Jun Wang et al. (Adv. Intelligent
      Systems 7(4) 2025, arXiv:2411.07309) demonstrated it via physical
      reservoir computing on a fabric arm. Both use isolated chambers or
      independently driven actuators. The open question is whether shared-manifold
      coupling—where opening one valve shifts pressure in adjacent chambers—
      breaks these methods and whether a cross-talk model can recover them.
      NOTE: This entry is best paired with A01 (P-V fatigue) as a combined
      study; see combined entry A01+A04.
    skill_target: soft robotics, system identification, machine learning
    difficulty: 2
    minimum_study: >
      Build a 3-chamber gripper on a shared manifold with one pressure sensor
      per chamber, collect 2000 traces paired with motion-capture ground truth,
      compare reconstruction accuracy with and without cross-talk correction
      (ridge regression, ARX model, echo-state network), quantify accuracy
      degradation attributable to manifold coupling alone.
    meche_advantage: Gripper fabrication, manifold design, and pneumatic circuit are ME.
    hardware_cost_est: ~$200 (silicone, shared manifold, 3× pressure sensors)
    nearest_paper: >
      Liangliang Wang et al., Soft Robotics 10(4) 2023, DOI 10.1089/soro.2021.0056;
      Jun Wang et al., Adv. Intelligent Systems 7(4) 2025, arXiv:2411.07309

  - id: A05
    title: Self-Healing Elastomer Fatigue vs. P-V Signature Recalibration
    lane: soft_robotics
    research_question: >
      Does incorporating self-healing chemistry (dynamic disulfide or
      hydrogen-bond networks) into pneumatic actuator silicone measurably
      shift the pressure-volume hysteresis curve, requiring recalibration
      of failure-onset detection methods designed for standard silicones?
    gap_proof: >
      Fatigue benchmarks (Roels et al. 2026) use virgin silicones. Self-healing
      work reports elongation-at-break recovery but does not characterize
      how healing events alter cyclic P-V signatures—the signature used
      for health monitoring.
    skill_target: materials science, soft robotics, fatigue testing
    difficulty: 2
    minimum_study: >
      Cast standard and self-healing silicone actuators side-by-side,
      cycle both to 60% life, allow healing interval, compare P-V curves
      before/after healing, quantify signature shift.
    meche_advantage: Elastomer casting and cyclic testing are ME lab skills.
    hardware_cost_est: ~$180 (silicone, healing agent, pressure cycling jig)
    nearest_paper: Standardized Elastomer Characterization, Advanced Intelligent Systems 2026

  # ── Lane B: Bio-inspired Locomotion ──────────────────────────────────────
  - id: B01
    title: Body-Wave Frequency as Efficiency Control in Granular Locomotion
    lane: bio_inspired
    research_question: >
      For a snake-inspired undulatory robot, does body-wave spatial frequency
      alone determine locomotion efficiency on sand vs. gravel, or does
      grain size require independent gait re-optimization?
    gap_proof: >
      Granular locomotion studies vary wave amplitude and body stiffness but
      rarely isolate spatial frequency as an independent variable across
      substrate grain sizes at matched wave speed.
    skill_target: robot design, gait control, experimental mechanics
    difficulty: 3
    minimum_study: >
      Build a 5-segment servo-driven snake robot, test 4 spatial frequencies
      × 2 substrates (fine sand, 3mm gravel), measure cost of transport
      and speed, fit a response surface.
    meche_advantage: >
      Linkage design, substrate selection, and force measurement are ME.
      Granular media mechanics is an ME subdiscipline.
    hardware_cost_est: ~$250 (servo motors, 3D printed links, sand/gravel arena)
    nearest_paper: Bio-inspired tail oscillation on granular terrains, arXiv 2509.12468

  - id: B02
    title: Geometry-Only Uphill Bristle-bot Locomotion Under Vibration
    lane: bio_inspired
    research_question: >
      Can leg angle anisotropy alone (no active control, no asymmetric
      vibration) produce reliable uphill net locomotion in a vibration-driven
      bristle-bot, and what leg angle maximizes achievable slope?
    gap_proof: >
      Bristle-bot literature focuses on horizontal locomotion speed and
      direction control. Inclined-surface locomotion using purely geometric
      anisotropy—without adding active degrees of freedom—has not been
      systematically characterized.
    skill_target: vibration mechanics, mechanism design, experimental dynamics
    difficulty: 2
    minimum_study: >
      Laser-cut 10 bristle-bot variants spanning 20–70° leg angle, drive with
      a single vibration motor at 3 frequencies, measure uphill speed on
      5° / 10° / 15° ramps, fit a geometric model.
    meche_advantage: Vibration dynamics and mechanism design are core ME topics.
    hardware_cost_est: ~$80 (laser-cut acrylic, vibration motors, incline ramp)
    nearest_paper: Bristle-bot locomotion literature 2015-2024

  # ── Lane C: Wearable Robotics ─────────────────────────────────────────────
  - id: C01
    title: EMG-Triggered vs. Fixed-Phase Cable Exosuit Timing for Stair Climbing
    lane: wearable_robotics
    research_question: >
      Does EMG-triggered cable pull timing outperform fixed gait-phase
      assistance for reducing metabolic cost during stair climbing in
      healthy users, and by how much does inter-subject EMG latency
      variability erode the benefit?
    gap_proof: >
      Exosuit timing comparisons focus on level walking. Stair climbing
      involves greater inter-subject gait variability and asymmetric
      loading, making the timing advantage of EMG less certain.
    skill_target: wearable design, EMG signal processing, biomechanics
    difficulty: 3
    minimum_study: >
      Build a unilateral ankle exosuit, recruit 10 healthy subjects,
      compare 3 conditions (no suit, fixed-phase, EMG-triggered) on a
      stair-climbing protocol, measure metabolic cost via VO2 proxy (HR + IMU).
    meche_advantage: Suit construction, cable routing, and force measurement are ME.
    hardware_cost_est: ~$400 (Bowden cables, EMG electrodes, servo, suit fabric)
    nearest_paper: Soft exosuit timing comparisons, 2019-2024

  - id: C02
    title: 3-Motor Cable-Driven 3-DOF Wrist Orthosis Torque Sufficiency
    lane: wearable_robotics
    research_question: >
      Can 3 forearm-mounted motors connected via a cable-differential routing
      provide sufficient torque for all 3 DOF of functional wrist tasks
      without mechanical interference or tendon slack?
    gap_proof: >
      3-DOF wrist orthoses typically use 4+ actuators or a complex
      differential. A cable-routing optimization that achieves 3-DOF
      with exactly 3 motors—and demonstrates torque adequacy for ADL
      tasks—has not been published at student scale.
    skill_target: cable kinematics, mechanism design, wearable fabrication
    difficulty: 3
    minimum_study: >
      Design cable routing in simulation (MATLAB/Python statics), build
      one prototype, measure output torque at 12 wrist poses, compare
      against ADL torque requirements from literature.
    meche_advantage: Cable statics, differential design, and fabrication are ME.
    hardware_cost_est: ~$350 (motors, Bowden cables, 3D printed frame)
    nearest_paper: Cable-driven wrist orthosis literature 2018-2024

  - id: C03
    title: Anchor-Point Biomechanics in Passive Exosuit Assistance
    lane: wearable_robotics
    research_question: >
      Does a beam-on-elastic-foundation model of soft tissue under an exosuit
      anchor predict optimal anchor location for metabolic reduction, or does
      inter-subject variability (thigh circumference, adipose thickness)
      dominate over mechanical placement?
    gap_proof: >
      Knarr et al. (arXiv 2507.23579, July 2025) showed anchor location changes
      metabolic reduction by up to 4% but only tested 3 configurations and
      validated no analytical model. The biomechanical model gap is explicit.
    skill_target: biomechanics, wearable robotics, experimental design
    difficulty: 3
    minimum_study: >
      Build adjustable-anchor passive spring exosuit, recruit 12 subjects,
      test 5 anchor positions, measure metabolic proxy (HR + IMU gait
      symmetry), compare against beam-on-elastic-foundation model predictions.
    meche_advantage: Structural mechanics of tissue-device interface is ME.
    hardware_cost_est: ~$200 (elastic bands, carbon fiber spring, adjustable straps)
    nearest_paper: Knarr et al., arXiv 2507.23579, 2025

  # ── Lane D: Human-Robot Interaction ──────────────────────────────────────
  - id: D01
    title: Motion Cues vs. Explicit Signals for Robot Intent Under Occlusion
    lane: hri
    research_question: >
      When a robot's body is partially occluded, do motion-legibility cues
      (speed modulation, trajectory curvature) or explicit signals (LEDs, audio)
      better enable bystanders to predict robot intent before a collision risk?
    gap_proof: >
      Robot intent legibility research studies open-space scenarios.
      The occlusion condition—where only part of the motion is visible—
      changes which cues are even available, a scenario not directly addressed.
    skill_target: HRI experiment design, user studies, ROS2 integration
    difficulty: 2
    minimum_study: >
      Run a between-subjects lab study (N=30) with a mobile robot navigating
      past an occluder, 3 conditions (motion-only, LED, audio), measure
      prediction accuracy and reaction time.
    meche_advantage: Robot motion generation and physical rig setup are ME-adjacent.
    hardware_cost_est: ~$100 (LEDs, speaker, occluder props, existing robot)
    nearest_paper: Jain et al., arXiv 2604.03451, 2026

  - id: D02
    title: Haptic Feedback Latency Threshold in Fine Teleoperation
    lane: hri
    research_question: >
      Below what round-trip haptic feedback latency does force feedback
      degrade fine manipulation task performance compared to no haptic
      feedback, and does the threshold shift with task difficulty?
    gap_proof: >
      Latency effects on teleoperation are known for gross manipulation.
      A systematic threshold curve across fine manipulation tasks (peg-in-hole,
      wire threading) at sub-50ms resolution has not been established.
    skill_target: teleoperation systems, psychophysics, human factors
    difficulty: 2
    minimum_study: >
      Build a bilateral teleoperation testbed, insert artificial delays
      at 0/10/20/40/80/160ms, recruit 15 subjects on peg-in-hole and
      wire-threading tasks, measure completion time and error rate.
    meche_advantage: Bilateral force control and testbed construction are ME.
    hardware_cost_est: ~$500 (haptic device or force-feedback joystick, robot arm)
    nearest_paper: Haptic latency in teleoperation surveys, 2015-2023

  - id: D03
    title: Yielding vs. Path-Signaling for Robot Proxemics in Narrow Corridors
    lane: hri
    research_question: >
      In a narrow corridor encounter, do people report higher comfort and
      lower perceived collision risk when a robot yields space vs. when
      it clearly signals its intended path before entering?
    gap_proof: >
      Proxemics work covers open spaces and hallways with room to maneuver.
      The narrow-corridor case—where yielding may not be physically possible—
      forces a path-signal vs. yield trade-off that has not been isolated.
    skill_target: HRI, robot navigation, user study design
    difficulty: 2
    minimum_study: >
      Build a narrow-corridor arena (80cm wide), run within-subjects study
      (N=24) comparing 3 robot behaviors (yield, LED path signal, motion
      path signal), collect Likert comfort ratings and physiological
      arousal proxy.
    meche_advantage: Physical arena construction and robot behavior tuning are ME-adjacent.
    hardware_cost_est: ~$150 (corridor props, LEDs, existing mobile robot)
    nearest_paper: Social robot proxemics surveys, 2018-2024

  - id: D04
    title: Expressive Motion vs. Explicit Signals for Fixed-Station Co-Bots
    lane: hri
    research_question: >
      For a robot doing repetitive assembly at a fixed station (human's
      visual attention partially on task), does expressive body motion
      outperform LED or audio signals for communicating state changes,
      or does the ranking from mobile-robot studies reverse?
    gap_proof: >
      Jain et al. (arXiv 2604.03451, 2026) compared modalities for mobile
      navigation only. Fixed-station assembly context—where the robot cannot
      move to signal—has not been studied, and task-attention load
      is a confound not yet isolated.
    skill_target: HRI, industrial robotics, experiment design
    difficulty: 2
    minimum_study: >
      Use a tabletop arm (Dobot/UR3) doing pick-and-place, run between-subjects
      study (N=30) comparing expressive joint motion, LED strip, and audio
      for state communication while subject performs secondary visual task.
    meche_advantage: Robot motion programming and workspace setup are ME-adjacent.
    hardware_cost_est: ~$200 (LED strip, speaker, tabletop arm already available)
    nearest_paper: Jain et al., arXiv 2604.03451, 2026

  # ── Lane E: Swarm Systems ─────────────────────────────────────────────────
  - id: E01
    title: Heterogeneous Wheeled-Aerial Swarm Structure-Building via Local Cues
    lane: swarm
    research_question: >
      Can a mixed swarm of wheeled ground robots and micro-UAVs coordinate
      to assemble a 2D structure using only local environmental cues and
      no explicit inter-robot communication?
    gap_proof: >
      Swarm construction work uses homogeneous robots or explicit
      communication. The heterogeneous case (ground+aerial role
      specialization) with stigmergic-only coordination has not been
      demonstrated at student scale.
    skill_target: swarm algorithms, multi-robot coordination, ROS2
    difficulty: 4
    minimum_study: >
      Implement a 2-wheeled-robot + 1-micro-UAV swarm, define a local-cue
      rule set for block placement, test assembly of a 10-block target
      structure in 5 trials, compare vs. ground-only homogeneous swarm.
    meche_advantage: UAV hardware, arena construction, and robot fabrication are ME.
    hardware_cost_est: ~$600 (micro-UAV, 2 wheeled robots, foam blocks, arena)
    nearest_paper: Swarm construction literature 2018-2024

  - id: E02
    title: Robot-Count Threshold for Swarm Foraging Under Sensor Noise
    lane: swarm
    research_question: >
      Is there a robot-count threshold above which adding more robots no longer
      improves foraging efficiency under realistic LiDAR dropout noise, and does
      the threshold shift predictably with noise severity?
    gap_proof: >
      Swarm foraging studies find diminishing returns with robot count in
      ideal conditions. Heterogeneous Foraging Swarms paper (Frontiers 2024)
      notes sensor noise effects are understudied—especially whether noise
      creates a premature saturation threshold.
    skill_target: swarm robotics, simulation, statistical design
    difficulty: 3
    minimum_study: >
      Implement foraging in simulation (ROS2/Gazebo or ARGoS), sweep robot
      count 3–30 with LiDAR dropout rates 0%/10%/25%, measure items/minute,
      fit a saturation model and extract threshold.
    meche_advantage: Robot dynamics modeling and sensor noise characterization are ME.
    hardware_cost_est: ~$0 (simulation only initially)
    nearest_paper: Heterogeneous Foraging Swarms, Frontiers in Robotics and AI 2024

  - id: E03
    title: Physical vs. Digital Stigmergy Medium in Outdoor Swarm Foraging
    lane: swarm
    research_question: >
      Does a physical stigmergy medium (UV-reactive chalk or RFID tag drops)
      degrade collective foraging performance more gracefully than a
      projected digital pheromone grid as swarm size scales from 3 to 30 robots?
    gap_proof: >
      Automatic stigmergy design (Nature Communications Engineering 2024)
      uses digital grids exclusively. No study compares physical vs.
      digital substrates for outdoor scalability—a deployment-critical gap.
    skill_target: swarm robotics, materials, embedded sensing
    difficulty: 3
    minimum_study: >
      Test 3-robot and 10-robot foraging with digital pheromone grid vs.
      UV chalk drops in an outdoor arena (10×10m), measure items collected
      per minute and signal decay rate, compare degradation curves.
    meche_advantage: UV material selection and arena design are ME-adjacent.
    hardware_cost_est: ~$400 (Thymio/e-puck robots, UV chalk, UV LEDs, RFID tags)
    nearest_paper: Automatic Design of Stigmergy Behaviours, Nature Communications Engineering 2024

  # ── Lane F: Perception Under Uncertainty ─────────────────────────────────
  - id: F01
    title: Incipient Slip Detection on Wet Objects via Low-Cost Tactile Array
    lane: perception
    research_question: >
      Can a low-cost resistive tactile array detect incipient slip on wet
      objects before grasp failure, and which pre-slip signal features
      (pressure centroid drift, contact area change, high-frequency
      vibration) have the most predictive lead time?
    gap_proof: >
      Wet-surface slip detection exists: Adachi et al. 2026 (Sci. Reports
      16:14179, DOI 10.1038/s41598-026-41096-z) used an AI-integrated bionic
      e-skin fingertip under water and oil. Low-cost resistive incipient slip
      exists on dry contact (Romeo et al. 2017, Sensors 17(8):1844,
      DOI 10.3390/s17081844). The "first wet slip detector" framing is dead.
      The surviving gap is: which resistive-array signal feature (centroid drift,
      contact-area rate, high-frequency vibration power) retains the most
      lead-time as liquid film thickness increases from 0 to 2mm—a controlled
      ablation no existing paper performs.
    skill_target: tactile sensing, signal processing, embedded systems
    difficulty: 2
    minimum_study: >
      Build a 4×4 resistive velostat array (<$50), run 200 grasp trials on
      cylinders at 5 controlled film thicknesses (0 / 0.25 / 0.5 / 1.0 / 2.0mm),
      label slip onset from high-speed camera, compare 5 feature families
      for F1-score and lead-time across film-thickness conditions.
    meche_advantage: Sensor fabrication, fluid film control, and gripper design are ME.
    hardware_cost_est: ~$120 (velostat, copper tape, microcontroller, gripper)
    nearest_paper: >
      Adachi et al. 2026, DOI 10.1038/s41598-026-41096-z;
      Romeo et al. 2017, DOI 10.3390/s17081844

  - id: F02
    title: Monocular Depth Network Robustness Under Water-Droplet Lens Soiling
    lane: perception
    research_question: >
      How does increasing water-droplet density on a camera lens degrade
      the depth estimates of off-the-shelf monocular depth networks, and
      which network architecture (transformer vs. CNN vs. hybrid) degrades
      most gracefully?
    gap_proof: >
      Monocular depth robustness work targets fog, rain in-scene, and
      image blur—not lens-surface soiling. Lens soiling creates spatially
      fixed, partially transparent occlusions not represented in standard
      augmentation pipelines.
    skill_target: computer vision, deep learning evaluation, experimental design
    difficulty: 2
    minimum_study: >
      Photograph calibration scenes through 5 soiling densities, run 4
      depth networks (MiDaS, DPT, Depth Anything, UniDepth), compute
      AbsRel and δ1 vs. soiling density curves, identify degradation onset.
    meche_advantage: Optical setup, soiling replication, and lens geometry are ME-adjacent.
    hardware_cost_est: ~$100 (calibration targets, camera, water misting setup)
    nearest_paper: Monocular depth robustness literature 2021-2024

  - id: F03
    title: Event-Based Tactile Sensing for Sub-Millisecond Impact Classification
    lane: perception
    research_question: >
      Can an event-based tactile sensor (event camera observing a deformable
      membrane) classify contact type—poke, slap, edge contact—faster than
      a resistive array can complete a single poll cycle?
    gap_proof: >
      Event-based opto-tactile skin (arXiv 2601.03907, 2026) demonstrated
      gesture recognition but not high-speed impact classification. The
      speed advantage of event cameras over polling tactile arrays for
      transient impacts has not been quantified.
    skill_target: event camera programming, tactile sensing, embedded systems
    difficulty: 3
    minimum_study: >
      Build membrane rig with event camera and resistive array side-by-side,
      run 300 impact events (drop-rig with 3 contact geometries), compare
      classification latency and accuracy of both sensing modalities.
    meche_advantage: Membrane fabrication, impact rig design, and drop testing are ME.
    hardware_cost_est: ~$400 (used event camera ~$200-400, PDMS membrane, drop rig)
    nearest_paper: Event-Based Opto-Tactile Skin, arXiv 2601.03907, 2026

  # ── Lane G: Compliant Mechanisms ─────────────────────────────────────────
  - id: G01
    title: Topology-Optimized vs. Parametric Compliant Gripper Adaptation
    lane: compliant_mechanisms
    research_question: >
      Does topology-optimized flexure geometry outperform parametric
      flexure designs for passive shape adaptation to unknown object
      geometries, and do FEA-predicted contact force distributions
      match physical measurements at low cost?
    gap_proof: >
      Topology optimization for grippers (ScienceDirect review 2025;
      Advanced Intelligent Systems 2025) focuses on force amplification
      or constant-force behavior, not shape-adaptive passive grasping.
      FEA validation at student scale is rarely demonstrated.
    skill_target: FEA, topology optimization, experimental mechanics
    difficulty: 3
    minimum_study: >
      Run TO in FEniCS or Ansys student, 3D print 3 optimized and 3 parametric
      gripper designs, measure contact force at 8 object shapes with force
      array, compare adaptation error and FEA prediction accuracy.
    meche_advantage: FEA, mechanism design, and fabrication are core ME.
    hardware_cost_est: ~$200 (3D printer filament, tactile array, test objects)
    nearest_paper: Topology-Shape-Size Optimization of Compliant Grippers, ScienceDirect 2025

  - id: G02
    title: Kirigami Actuator Force-Stroke Fatigue vs. Cut-Pattern Geometry
    lane: compliant_mechanisms
    research_question: >
      Does cut-pattern geometry (straight, rotational, spiral) independently
      determine hysteresis and fatigue rate in kirigami actuators, or is
      there a geometry-material coupling that requires joint characterization?
    gap_proof: >
      Hysteresis and cut-parameter variation for kirigami exist but only
      shallowly: Khosravi et al. 2021 (Front. Robotics AI 8:749051,
      DOI 10.3389/frobt.2021.749051) report force-displacement curves with
      varied cut geometry but only ~5 cycles and one material family (paper/PET).
      The open contribution is a cross-pattern × material × thickness fatigue
      dataset to hundreds of cycles—enough to fit a geometry-material coupling
      model and determine whether pattern choice and material choice can be
      optimized independently or must be co-designed.
    skill_target: compliant mechanisms, laser cutting, fatigue testing
    difficulty: 2
    minimum_study: >
      Laser-cut 4 pattern types (straight, rotational, spiral, hierarchical)
      in Mylar and PET at 2 thicknesses each (8 conditions × 5 replicates),
      cycle to 500 on a tensile jig, record force-stroke loops at 1, 100,
      300, and 500 cycles, fit a geometry-material coupling model and extract
      fatigue slope per condition.
    meche_advantage: Material fatigue testing and laser fabrication are ME lab skills.
    hardware_cost_est: ~$100 (Mylar/PET sheet, laser cutter access, load cell)
    nearest_paper: >
      Khosravi et al. 2021, DOI 10.3389/frobt.2021.749051;
      Kirigami Review, Advanced Intelligent Systems 2026

  # ── Lane H: Embodied Computation ─────────────────────────────────────────
  - id: H01
    title: Tensegrity Physical Reservoir Computing — Strut Stiffness vs. IPC
    lane: embodied_computation
    research_question: >
      Does strut stiffness ratio and pre-tension level in a physical tensegrity
      robot set its Information Processing Capacity (IPC, Dambre et al. 2012)
      in a way that matches simulation predictions, and does the IPC peak
      occur at the edge of the echo-state property rather than at the
      edge of mechanical chaos?
    gap_proof: >
      Foundational tensegrity PRC (Caluwaerts et al. 2013, DOI 10.1162/ARTL_a_00080)
      and stiffness-to-memory trends (Fujita et al. 2018, DOI 10.12792/jiiae.6.92)
      exist in simulation only. Recent physical demonstrations (AIP Chaos 2025,
      arXiv:2507.21496; Nature Communications 2026) show PRC works physically
      but do not measure IPC vs. mechanical parameters. Critically: Lyapunov
      exponent ≠ memory capacity—the correct metric is IPC (Dambre et al.,
      Sci. Reports 2:514, 2012, DOI 10.1038/srep00514), and the MC peak
      aligns with the echo-state property boundary, not always edge-of-chaos
      (Taniguchi 2025, arXiv:2503.12957). The experimental gap is: does the
      IPC-vs-stiffness curve from physical hardware match the simulation trend,
      and where does the physical echo-state boundary sit?
    skill_target: structural mechanics, nonlinear dynamics, machine learning
    difficulty: 3
    minimum_study: >
      Build 3 tensegrity robots (5-bar) at 3 stiffness ratios from elastic
      cord and carbon-fibre rods (<$80 each), measure response to impulse
      inputs, compute Lyapunov exponent, test temporal classification
      (payload weight, orientation) accuracy vs. stiffness ratio.
    meche_advantage: >
      Tensegrity mechanics, pre-tension control, and structural dynamics are
      ME—this is a structural problem dressed as computation.
    hardware_cost_est: ~$240 (elastic cord, carbon fibre rods, IMU, accelerometers)
    nearest_paper: Physical Reservoir Computing in Soft Tensegrity Robots, AIP Chaos 2025 (arXiv 2507.21496)

